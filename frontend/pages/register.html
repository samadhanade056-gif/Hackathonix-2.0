<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — InternAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="noise"></div>
<div class="hero-bg">
  <div class="orb orb1"></div>
  <div class="orb orb3"></div>
</div>

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">Intern<span>AI</span></a>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <a href="../index.html" class="logo">Intern<span>AI</span></a>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Already have an account? <a href="login.html">Login</a></p>

    <form id="registerForm" onsubmit="InternAI.handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-input" type="text" id="name" placeholder="Priya Sharma" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="college">College</label>
          <input class="form-input" type="text" id="college" placeholder="XYZ University"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="branch">Branch</label>
          <input class="form-input" type="text" id="branch" placeholder="CSE"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Min 8 chars" required minlength="8"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm</label>
          <input class="form-input" type="password" id="confirm_password" placeholder="••••••••" required/>
        </div>
      </div>
      <div style="margin-bottom:18px">
        <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer">
          <input type="checkbox" required style="margin-top:3px;accent-color:var(--accent)"/>
          <span style="font-size:.82rem;color:var(--text-2)">
            I agree to the <a href="#" style="color:var(--accent-2)">Terms of Service</a>
            and <a href="#" style="color:var(--accent-2)">Privacy Policy</a>
          </span>
        </label>
      </div>
      <button type="submit" class="btn-full">Create Account</button>
    </form>
  </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
